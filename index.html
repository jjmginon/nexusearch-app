<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="JJ Ginon">
    <meta name="description" content="NexuSearch — Intelligence at the intersection.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Inter:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="dist/css/style.min.css">
    <script src="js/main.js" type="module"></script>
    <title>NexuSearch</title>
</head>

<body>
    <main class="page">
        <h1 class="sr-only">NexuSearch — Intelligence at the intersection.</h1>

        <section class="search-entry">
            <h2 class="sr-only">Search Term Entry</h2>

            <div class="wordmark" aria-hidden="true">
                <span class="wordmark__nexu">Nexu</span><span class="wordmark__search">Search</span>
            </div>

            <p class="search-entry__tagline">Search deeper. Know more.</p>

            <form id="search-form" class="search-bar" role="search">
                <label class="sr-only" for="search-input">Enter a search term or phrase</label>
                <input id="search-input" class="search-bar__input" type="text" autocomplete="off" role="searchbox"
                    placeholder="What are you looking for?">
                <button id="search-clear" class="search-bar__clear search-bar__clear--hidden" type="button"
                    aria-label="Clear search">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="square" aria-hidden="true">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
                <button id="search-submit" class="search-bar__submit" type="submit" aria-label="Search">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="square" aria-hidden="true">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <span>Search</span>
                </button>
            </form>
        </section>

        <section class="results">
            <h2 class="sr-only">Search Results</h2>
            <div class="results__stats-bar">
                <p id="results-stats" class="results__stats" aria-live="assertive"></p>
            </div>
            <div id="results-list" class="results__list"></div>
        </section>

        <footer class="site-footer">
            <p class="site-footer__text">
                Data source: <a class="site-footer__link" href="https://www.wikipedia.org/" target="_blank"
                    rel="noopener noreferrer">Wikipedia Open API</a>
                &nbsp;//&nbsp; Open knowledge for everyone
            </p>
        </footer>
    </main>
</body>

</html>
